<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday!</title>
<style>
  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
    color: #fff;
    text-align: center;
    overflow-x: hidden;
  }
  .container {
    padding: 50px 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  h1 {
    font-size: 3rem;
    animation: pop 1s ease;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
  }
  p {
    font-size: 1.2rem;
    max-width: 600px;
  }
  .menu {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 40px;
  }
  .card {
    width: 180px;
    height: 180px;
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    transition: transform 0.3s;
  }
  .card:hover {
    transform: scale(1.1) rotate(3deg);
  }
  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .card span {
    display: block;
    margin-top: 10px;
    font-weight: bold;
    color: #fff;
  }
  @keyframes pop {
    0% {transform: scale(0);}
    80% {transform: scale(1.2);}
    100% {transform: scale(1);}
  }
  .balloon {
    position: absolute;
    width: 50px;
    height: 70px;
    background: #ff6b81;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    animation: float 6s ease-in infinite;
  }
  @keyframes float {
    0% {bottom: -100px; transform: translateX(0);}
    100% {bottom: 110vh; transform: translateX(100px);}
  }
</style>
</head>
<body>
<div class="balloon" style="left:10%; background:#ff6b81; animation-delay:0s"></div>
<div class="balloon" style="left:30%; background:#feca57; animation-delay:2s"></div>
<div class="balloon" style="left:70%; background:#48dbfb; animation-delay:4s"></div>

<div class="container">
  <h1>Happy Birthday my ________! 🎂</h1>
  <p>Today is all about you! Click on the cards below to explore surprises, memories, and cake 🎈</p>
  
  <div class="menu">
    <a href="gallery.html">
      <div class="card">
        <img src="https://images.unsplash.com/photo-1513151233558-d860c5398176?w=400" alt="Gallery">
        <span>Photo Gallery</span>
      </div>
    </a>
    
    <a href="wishes.html">
      <div class="card">
        <img src="https://images.unsplash.com/photo-1525498128493-380d1990a112?w=400" alt="Wishes">
        <span>Birthday Wishes</span>
      </div>
    </a>
    
    <a href="cake.html">
      <div class="card">
        <img src="https://images.unsplash.com/photo-1621303837174-89787a7d4729?w=400" alt="Cake">
        <span>Cut The Cake</span>
      </div>
    </a>
    
    <a href="index.html">
      <div class="card">
        <img src="https://images.unsplash.com/photo-1467810563316-b5476525c0f9?w=400" alt="Home">
        <span>Back Home</span>
      </div>
    </a>
  </div>
</div>

</body>
</html>
